# Security response headers - single source of truth for the site's security posture.
# Included by every location in nginx-personal-website.conf (and the commented HTTPS block).
# Deploy to /etc/nginx/snippets/security-headers.conf (see docs/DEPLOY.md);
# if missing, Nginx fails to start ("include file ... not found").
#
# Keep in sync with the headers middleware in server/index.js (used by `npm start`
# local preview, where Nginx is not in front). Changing CSP here requires the same
# change in server/index.js.
#
# HSTS (Strict-Transport-Security) is intentionally NOT here: it must only be sent
# over HTTPS, so it lives in the HTTPS server block of nginx-personal-website.conf.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
