# Nginx configuration for personal-website
# Replace YOUR_DOMAIN with your actual domain name.
# Replace /srv/personal-website with the actual deployment path.

# Rate limiting zone for API endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# HTTP → HTTPS redirect (enable after domain + HTTPS is set up)
