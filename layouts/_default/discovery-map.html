{{- define "main" }}

<header class="page-header">
    <h1>{{ .Title }}</h1>
</header>

<div class="map-page">
    <div class="map-controls">
        <label>图谱类型
            <select id="graphKind">
                <option value="links">内容网络</option>
                <option value="tags">主题网络</option>
            </select>
        </label>
        <label>标签过滤
            <select id="tagFilter">
                <option value="all">全部</option>
            </select>
        </label>
        <label>边类型
            <select id="edgeTypeFilter">
                <option value="all">全部</option>
            </select>
        </label>
        <label>最小权重
            <input type="range" id="minWeight" min="1" max="10" value="1">
            <span id="minWeightValue">1</span>
        </label>
        <button id="resetView">重置视图</button>
    </div>

    <div class="map-body">
        <svg id="graph" class="graph-container"></svg>
        <aside class="map-sidebar">
            <div id="title"><strong>尚未选择节点</strong></div>
            <div id="meta" class="meta"></div>
            <div id="summary"></div>
            <div id="out"></div>
            <div id="relations">
                <div class="meta">选择节点后可查看邻居与关系类型</div>
            </div>
        </aside>
    </div>
</div>

{{- end }}
