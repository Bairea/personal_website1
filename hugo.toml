baseURL = "/"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
title = "个人网站"
theme = "PaperMod"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  description = "面向技术内容的个人站点，提供文章发布与分类浏览。"
  keywords = ["hugo", "pagefind", "搜索", "分类", "标签"]

  [params.homeInfoParams]
    Title = "个人网站"
    Content = "面向技术内容的个人站点，提供文章发布与分类浏览。"

  [params.assets]
    disableFingerprinting = true

[[menu.main]]
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "时间线"
  url = "/archives"
  weight = 2

[[menu.main]]
  name = "搜索"
  url = "/search"
  weight = 3

[[menu.main]]
  name = "分类"
  url = "/categories/"
  weight = 4

[[menu.main]]
  name = "标签"
  url = "/tags/"
  weight = 5

[[menu.main]]
  name = "项目"
  url = "/projects/"
  weight = 6

[[menu.main]]
  name = "技术专栏"
  url = "/columns/"
  weight = 7

[permalinks]
  posts = "/posts/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"
  project = "projects"
  column = "columns"

[markup.goldmark.renderer]
  unsafe = false

[markup.highlight]
  noClasses = false
